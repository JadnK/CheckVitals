spring:
  application:
    name: UptimeWatch

  datasource:
    url: jdbc:h2:file:./data/uptimewatch
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

checkvitals:
  check:
    interval-ms: 30000
    initial-delay-ms: 5000